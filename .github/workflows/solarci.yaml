name: ci
on:
    push:
        branches:
        - main 
        - feature/*
env:
  MONGO_URI: ${{ vars.MONGO_URL }}
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME}}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD}}


jobs:
    run_test:
        runs-on: ${{ matrix.operating_system }}
        strategy:
            matrix:
               nodejs_version: [18,19]
               operating_system: [ ubuntu-24.04, ubuntu-latest]
  

        steps:
        -  name: checkout
           uses:  actions/checkout@v4
        -  name: Use Node.js
           uses: actions/setup-node@v4
           with:
             node-version: ${{ matrix.nodejs_version}}

        - name: install dependancy
          run: npm install
        - name: unit testing
          run: npm test

        - name: change report name
          run: mv test-results.xml test-results-${{matrix.operating_system}}-${{matrix.nodejs_version}}.xml

        - name: upload  unit test report
          uses: actions/upload-artifact@v4
          with: 
            name: unitTestReport-${{matrix.operating_system}}-${{matrix.nodejs_version}}
            path: test-results-${{matrix.operating_system}}-${{matrix.nodejs_version}}.xml

    run_code_coverage:
        runs-on: 'ubuntu-latest'
        steps:
        -  name: checkout
           uses:  actions/checkout@v4
        -  name: Use Node.js
           uses: actions/setup-node@v4
           with:
             node-version: 18

        - name: install dependancy
          run: npm install
        - name: unit testing
          run: npm run coverage
          
          continue-on-error: true  # it will excute and test is marked as pass

        - name: upload code coverage report
          #if: failure() # if stattement step and job will be failed even all step executed
          #if : always()
          uses: actions/upload-artifact@v4
          with: 
            name: code-coverage-${{github.sha}}
            path: coverage         
            retention-days: 1

    docker:
        needs: [run_test,run_code_coverage]
        runs-on: 'ubuntu-latest'
        permissions:
            packages: write
        steps:
        - name: Docker Login
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        #login into github container registry
        - name: GHCR Login
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build 
          uses: docker/build-push-action@v5
          with:
            push: false
            tags: ${{vars.DOCKER_USERNAME}}/solar-system:${{github.sha}}

        - name: Run Docker Container
          run: |
            docker run --name solar-system-app -d \
              -p 3000:3000 \
              -e MONGO_URI=${{ env.MONGO_URI }} \
              -e MONGO_USERNAME=${{ env.MONGO_USERNAME }} \
              -e MONGO_PASSWORD=${{ env.MONGO_PASSWORD }} \
              ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.sha }}
            export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)           
            echo "CONTAINER_IP=$IP" >> $GITHUB_ENV
            echo "The Container IP is: $IP"
            wget -q -O - 127.0.0.1:3000/live | grep live

        - name: Build and push
          uses: docker/build-push-action@v5
          with:
           # context: .
            push: true
            tags: | 
                 ${{vars.DOCKER_USERNAME}}/solar-system:${{github.sha}}
                 ghcr.io/${{vars.DOCKER_USERNAME}}/solar-system:${{github.sha}}
              
    Kubernetese_CD:
      runs-on: 'ubuntu-latest'
      needs: [run_test,run_code_coverage,docker ]
      steps: 
        
        # kubectl install on the runner
        - name: kubectl install on the runner
          uses: azure/setup-kubectl@v4
          #with:
           # version: '<version>' # default is latest stable
          id: install    
        -  name: checkout
           uses:  actions/checkout@v4
        - name: setting kubeconfig 
          run: |
            curl -sfL https://get.k3s.io | sh -
            mkdir -p ~/.kube
            sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
            sudo chown $USER:$USER ~/.kube/config 
            cat ~/.kube/config
            sleep 60
            kubectl get pods -A
        
        - name: saving nginx controller ip as github environment variable    
          run: |
            echo "INGRESS_IP=$(kubectl -n ingress-nginx get services ingress-nginx-controller -o jsonpath="{.status.loadBalancer.ingress[0].ip}")" >> $GITHUB_ENV
        - name: Replace place holder in k8s manifest files    
          uses: cschleiden/replace-tokens@v1
          with:
            tokenPrefix: '_{_'
            tokenSuffix: '_}_'
            files: '["kubernetes/development/*.yaml"]'
          env:
            NAMESPACE: ${{ vars.NAMESPACE}}
            REPLICAS: ${{ vars.REPLICAS}}
            IMAGES: ${{vars.DOCKER_USERNAME}}/solar-system:${{github.sha}}
            INGRESS_IP: ${{ env.INGRESS_IP}}
        
        - name: Display Kubernates files after replace
          run: |
              cat kubernetes/development/*.yaml

        - name: Create MongoDB Secret
          run: |
             kubectl create namespace ${{ vars.NAMESPACE}} || true
             kubectl -n ${{ vars.NAMESPACE}} create secret generic mongo-db-creds \
             --from-literal=MONGO_URI=${{ env.MONGO_URI}} \
             --from-literal=MONGO_USERNAME=${{ env.MONGO_USERNAME}} \
             --from-literal=MONGO_PASSWORD=${{ env.MONGO_PASSWORD}} \
             --save-config \
             --dry-run=client \
             -o yaml | kubectl apply -f -

        - name: Deploy to Dev Environment
          run: |
            kubectl apply -f kubernetes/development

        
        
            

                                